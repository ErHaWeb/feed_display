name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  composer-validate:
    name: Composer validate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate composer.json
        run: Build/Scripts/runTests.sh -s composerValidate -b docker

  static-and-unit:
    name: TYPO3 ${{ matrix.typo3 }} / PHP ${{ matrix.php }} static + unit
    runs-on: ubuntu-24.04
    needs: composer-validate
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - typo3: '12'
            php: '8.1'
          - typo3: '12'
            php: '8.2'
          - typo3: '12'
            php: '8.3'
          - typo3: '12'
            php: '8.4'
          - typo3: '13'
            php: '8.2'
          - typo3: '13'
            php: '8.3'
          - typo3: '13'
            php: '8.4'
          - typo3: '13'
            php: '8.5'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install TYPO3 test setup
        run: Build/Scripts/runTests.sh -s composerInstall -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker

      - name: Lint PHP files
        run: Build/Scripts/runTests.sh -s lintPhp -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker

      - name: Lint JSON files
        run: Build/Scripts/runTests.sh -s lintJson -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker

      - name: Lint YAML files
        run: Build/Scripts/runTests.sh -s lintYaml -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker

      - name: Lint TypoScript files
        run: Build/Scripts/runTests.sh -s lintTypoScript -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker

      - name: Lint XLIFF files
        run: Build/Scripts/runTests.sh -s lintXliff -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker

      - name: Lint Services.yaml files
        run: Build/Scripts/runTests.sh -s lintServicesYaml -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker

      - name: Run PHP-CS-Fixer dry-run
        run: PHP_CS_FIXER_IGNORE_ENV=1 Build/Scripts/runTests.sh -s cgl -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker

      - name: Run PHPStan
        run: Build/Scripts/runTests.sh -s phpstan -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker

      - name: Run unit tests
        run: Build/Scripts/runTests.sh -s unit -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker

  functional:
    name: TYPO3 ${{ matrix.typo3 }} / PHP ${{ matrix.php }} functional
    runs-on: ubuntu-24.04
    needs: composer-validate
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - typo3: '12'
            php: '8.1'
          - typo3: '12'
            php: '8.2'
          - typo3: '12'
            php: '8.3'
          - typo3: '12'
            php: '8.4'
          - typo3: '13'
            php: '8.2'
          - typo3: '13'
            php: '8.3'
          - typo3: '13'
            php: '8.4'
          - typo3: '13'
            php: '8.5'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install TYPO3 test setup
        run: Build/Scripts/runTests.sh -s composerInstall -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker

      - name: Run functional DB matrix
        shell: bash
        run: |
          set -euo pipefail
          Build/Scripts/runTests.sh -s functional -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker -d sqlite
          Build/Scripts/runTests.sh -s functional -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker -d mariadb -a mysqli -i 10.11
          Build/Scripts/runTests.sh -s functional -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker -d mariadb -a pdo_mysql -i 10.11
          Build/Scripts/runTests.sh -s functional -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker -d mariadb -a mysqli -i 11.4
          Build/Scripts/runTests.sh -s functional -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker -d mariadb -a pdo_mysql -i 11.4
          Build/Scripts/runTests.sh -s functional -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker -d mysql -a mysqli -i 8.0
          Build/Scripts/runTests.sh -s functional -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker -d mysql -a pdo_mysql -i 8.0
          Build/Scripts/runTests.sh -s functional -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker -d mysql -a mysqli -i 8.4
          Build/Scripts/runTests.sh -s functional -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker -d mysql -a pdo_mysql -i 8.4
          Build/Scripts/runTests.sh -s functional -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker -d postgres -i 15
          Build/Scripts/runTests.sh -s functional -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker -d postgres -i 16
          Build/Scripts/runTests.sh -s functional -t ${{ matrix.typo3 }} -p ${{ matrix.php }} -b docker -d postgres -i 17
