---
sniffs:
  - class: Indentation
    parameters:
      indentConditions: false
      indentPerLevel: 4
      useSpaces: true
  # The distributed config is merged in addition to this local file. Explicitly
  # disable the high-noise default sniffs we do not want in the scaffold baseline.
  - class: DeadCode
    disabled: true
  - class: OperatorWhitespace
  - class: RepeatingRValue
    disabled: true
  - class: DuplicateAssignment
    disabled: true
